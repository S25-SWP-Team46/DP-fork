services:
  chroma:
    build:
      context: ./backend/core/chroma
    volumes:
      - ./backend/core/chroma:/app
      - ./backend/playground:/app/playground
    ports:
      - "9000:9000"
    environment:
      - PYTHONPATH=/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    #volumes:
    #- ./frontend:/app

  postgres:
    build:
      context: ./backend
    volumes:
      - ./backend/core:/app
    image: postgres:15
    ports:
      - "5432:5432"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mysql
      - mongodb
      - frontend
      - chroma
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - SECRET_KEY=replace-this-in-prod
      - DJANGO_SETTINGS_MODULE=core.settings
      - POSTGRES_DB=school_db
      - POSTGRES_USER=app_admin
      - POSTGRES_PASSWORD=StrongPassword!
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      # Optionally keep for legacy code:
      - DATABASE_URL=sqlite:///db.sqlite3
    #volumes:
    #  - ./postgres_data:/var/lib/postgresql/data

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_USER: my_mysql_user
      MYSQL_PASSWORD: my_mysql_password
      MYSQL_ROOT_PASSWORD: my_mysql_root_password
    volumes:
      - ./mysql_data:/var/lib/mysql

  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: my_mongo_user
      MONGO_INITDB_ROOT_PASSWORD: my_mongo_password
    volumes:
      - ./mongo_data:/data/db

volumes:
  postgres_data:
  mysql_data:
  mongo_data:
